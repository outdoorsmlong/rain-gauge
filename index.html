<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain Gauge Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1923;
      color: #e0e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 24px 0 16px;
    }
    header h1 {
      font-size: 1.9rem;
      color: #7dd3fc;
      letter-spacing: 1px;
    }
    header p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* Status bar */
    #status-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 10px 0 24px;
      font-size: 0.85rem;
      color: #64748b;
    }
    #status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #64748b;
      transition: background 0.4s;
    }
    #status-dot.ok  { background: #34d399; }
    #status-dot.err { background: #f87171; }

    /* Stat cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto 28px;
    }
    .card {
      background: #1e2d3d;
      border: 1px solid #2a3f54;
      border-radius: 12px;
      padding: 18px 16px 14px;
      text-align: center;
    }
    .card .label {
      font-size: 0.75rem;
      color: #7dd3fc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #f0f9ff;
    }
    .card .unit {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* Chart */
    .chart-wrap {
      background: #1e2d3d;
      border: 1px solid #2a3f54;
      border-radius: 12px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto 28px;
    }
    .chart-wrap h2 {
      font-size: 0.9rem;
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 14px;
    }

    /* Table */
    .table-wrap {
      background: #1e2d3d;
      border: 1px solid #2a3f54;
      border-radius: 12px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto 40px;
      overflow-x: auto;
    }
    .table-wrap h2 {
      font-size: 0.9rem;
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 8px 12px;
      color: #7dd3fc;
      border-bottom: 1px solid #2a3f54;
      font-weight: 600;
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid #172230;
      color: #cbd5e1;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #243447; }

    .refresh-btn {
      display: block;
      margin: 0 auto 10px;
      padding: 9px 28px;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #38bdf8; }
  </style>
</head>
<body>

<header>
  <h1>🌧️ Rain Gauge Dashboard</h1>
  <p>CR800 Data Logger · Supabase · Live</p>
</header>

<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">Loading...</span>
</div>

<!-- Summary cards -->
<div class="cards">
  <div class="card">
    <div class="label">Last 5 min</div>
    <div class="value" id="card-5min">—</div>
    <div class="unit">inches</div>
  </div>
  <div class="card">
    <div class="label">24-Hour Total</div>
    <div class="value" id="card-24h">—</div>
    <div class="unit">inches</div>
  </div>
  <div class="card">
    <div class="label">Month Total</div>
    <div class="value" id="card-month">—</div>
    <div class="unit">inches</div>
  </div>
  <div class="card">
    <div class="label">Battery</div>
    <div class="value" id="card-batt">—</div>
    <div class="unit">volts</div>
  </div>
</div>

<!-- Chart -->
<div class="chart-wrap">
  <h2>Rainfall — Last 24 Hours (5-min intervals)</h2>
  <canvas id="rainChart" height="110"></canvas>
</div>

<!-- Recent records table -->
<div class="table-wrap">
  <h2>Recent Records</h2>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>5-min (in)</th>
        <th>24h (in)</th>
        <th>Month (in)</th>
        <th>Battery (V)</th>
      </tr>
    </thead>
    <tbody id="data-table-body">
      <tr><td colspan="5" style="text-align:center;color:#64748b">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
  // ── CONFIGURE THESE ────────────────────────────────────────────
  const SUPABASE_URL = 'https://gavzjtjhaeyzukzvjmvm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_lrMrLRR2lwdQL4Sf8gDUFQ_Zez1NAQ_';
  const TABLE       = 'rainfall_data';
  // ──────────────────────────────────────────────────────────────

  let chart = null;

  async function loadData() {
    setStatus('loading');
    try {
      // Fetch last 288 records = 24h at 5-min intervals
      const url = `${SUPABASE_URL}/rest/v1/${TABLE}`
        + `?select=recorded_at,rain_5min,rain_24h,rain_month,battery_v`
        + `&order=recorded_at.desc&limit=288`;

      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const rows = await res.json();

      if (!rows.length) {
        setStatus('No data yet — waiting for CR800', false);
        return;
      }

      updateCards(rows[0]);
      updateChart(rows);
      updateTable(rows.slice(0, 20));
      setStatus(`Updated ${formatTime(rows[0].recorded_at)}`, true);

    } catch (err) {
      console.error(err);
      setStatus('Error: ' + err.message, false, true);
    }
  }

  function updateCards(row) {
    document.getElementById('card-5min').textContent  = fmt(row.rain_5min, 4);
    document.getElementById('card-24h').textContent   = fmt(row.rain_24h,  3);
    document.getElementById('card-month').textContent = fmt(row.rain_month,2);
    document.getElementById('card-batt').textContent  = fmt(row.battery_v, 2);
  }

  function updateChart(rows) {
    const reversed = [...rows].reverse();
    const labels   = reversed.map(r => formatTime(r.recorded_at));
    const data     = reversed.map(r => parseFloat(r.rain_5min) || 0);

    if (chart) {
      chart.data.labels = labels;
      chart.data.datasets[0].data = data;
      chart.update();
      return;
    }

    const ctx = document.getElementById('rainChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Rain (in)',
          data,
          backgroundColor: 'rgba(125,211,252,0.55)',
          borderColor:     '#7dd3fc',
          borderWidth: 1,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.parsed.y.toFixed(4)}"` 
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: '#64748b',
              maxTicksLimit: 12,
              maxRotation: 45
            },
            grid: { color: '#172230' }
          },
          y: {
            ticks: { color: '#64748b' },
            grid:  { color: '#172230' },
            title: {
              display: true,
              text: 'Inches',
              color: '#94a3b8'
            }
          }
        }
      }
    });
  }

  function updateTable(rows) {
    const tbody = document.getElementById('data-table-body');
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${formatTime(r.recorded_at)}</td>
        <td>${fmt(r.rain_5min, 4)}</td>
        <td>${fmt(r.rain_24h,  4)}</td>
        <td>${fmt(r.rain_month,4)}</td>
        <td>${fmt(r.battery_v, 2)}</td>
      </tr>`).join('');
  }

  function setStatus(msg, ok = null, err = false) {
    document.getElementById('status-text').textContent = msg;
    const dot = document.getElementById('status-dot');
    dot.className = '';
    if (ok === true)  dot.classList.add('ok');
    if (err)          dot.classList.add('err');
  }

  function formatTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-US', {
      month:'short', day:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  }

  function fmt(val, decimals) {
    const n = parseFloat(val);
    return isNaN(n) ? '—' : n.toFixed(decimals);
  }

  // Load on start, then refresh every 5 minutes
  loadData();
  setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
