<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain Gauge Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1923;
      color: #e0e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 24px 0 16px;
    }
    header h1 {
      font-size: 1.9rem;
      color: #7dd3fc;
      letter-spacing: 1px;
    }
    header p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* Status bar */
    #status-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 10px 0 24px;
      font-size: 0.85rem;
      color: #64748b;
    }
    #status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #64748b;
      transition: background 0.4s;
    }
    #status-dot.ok  { background: #34d399; }
    #status-dot.err { background: #f87171; }

    /* Stat cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto 28px;
    }
    .card {
      background: #1e2d3d;
      border: 1px solid #2a3f54;
      border-radius: 12px;
      padding: 18px 16px 14px;
      text-align: center;
    }
    .card .label {
      font-size: 0.75rem;
      color: #7dd3fc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #f0f9ff;
    }
    .card .unit {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* Chart */
    .chart-wrap {
      background: #1e2d3d;
      border: 1px solid #2a3f54;
      border-radius: 12px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto 28px;
    }
    .chart-wrap h2 {
      font-size: 0.9rem;
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .tabs { display: flex; gap: 6px; }
    .tab {
      padding: 6px 14px;
      background: #172230;
      color: #94a3b8;
      border: 1px solid #2a3f54;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab:hover { background: #243447; }
    .tab.active {
      background: #0ea5e9;
      border-color: #0ea5e9;
      color: #fff;
    }

    /* Table */
    .table-wrap {
      background: #1e2d3d;
      border: 1px solid #2a3f54;
      border-radius: 12px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto 40px;
      overflow-x: auto;
    }
    .table-wrap h2 {
      font-size: 0.9rem;
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 8px 12px;
      color: #7dd3fc;
      border-bottom: 1px solid #2a3f54;
      font-weight: 600;
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid #172230;
      color: #cbd5e1;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #243447; }

    .refresh-btn {
      display: block;
      margin: 0 auto 10px;
      padding: 9px 28px;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #38bdf8; }
  </style>
</head>
<body>

<header>
  <h1>🌧️ 152 Rain Gauge Dashboard</h1>
  <p>EML Rain Gauge 0.201mm/tip converted to inches</p>
</header>

<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">Loading...</span>
</div>

<!-- Summary cards -->
<div class="cards">
  <div class="card">
    <div class="label">Last 5 min</div>
    <div class="value" id="card-5min">—</div>
    <div class="unit">inches</div>
  </div>
  <div class="card">
    <div class="label">24-Hour Total</div>
    <div class="value" id="card-24h">—</div>
    <div class="unit">inches</div>
  </div>
  <div class="card">
    <div class="label">Month Total</div>
    <div class="value" id="card-month">—</div>
    <div class="unit">inches</div>
  </div>
</div>

<!-- Chart -->
<div class="chart-wrap">
  <div class="chart-head">
    <h2 id="chart-title">Rainfall — Last 24 Hours (5-min intervals)</h2>
    <div class="tabs">
      <button class="tab active" id="tab-24h"     onclick="switchTab('24h')">24 Hours</button>
      <button class="tab"        id="tab-weekly"  onclick="switchTab('weekly')">Weekly</button>
      <button class="tab"        id="tab-monthly" onclick="switchTab('monthly')">Monthly</button>
    </div>
  </div>
  <canvas id="rainChart" height="110"></canvas>
</div>

<!-- Recent records table -->
<div class="table-wrap">
  <h2>Recent Records</h2>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>5-min (in)</th>
        <th>24h (in)</th>
        <th>Month (in)</th>
      </tr>
    </thead>
    <tbody id="data-table-body">
      <tr><td colspan="4" style="text-align:center;color:#64748b">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
  // ── CONFIGURE THESE ────────────────────────────────────────────
  const SUPABASE_URL = 'https://gavzjtjhaeyzukzvjmvm.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhdnpqdGpoYWV5enVrenZqbXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDc0MDcsImV4cCI6MjA4OTIyMzQwN30.5nukel0xQfhfmk9G1vA4UGUVXJK_NigyGEuaOzyc-sY';
  const TABLE       = 'rainfall_data';
  // ──────────────────────────────────────────────────────────────

  let chart = null;
  let currentTab  = '24h';
  let recentRows  = [];   // 5-min records, newest first
  let dailyRows   = [];   // daily totals from daily_rainfall view, newest first

  const sbHeaders = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`
  };

  async function loadData() {
    setStatus('loading');
    try {
      // Recent 5-min records (24h worth) + daily totals (31 days), in parallel
      const recentUrl = `${SUPABASE_URL}/rest/v1/${TABLE}`
        + `?select=recorded_at,rain_5min,rain_24h,rain_month`
        + `&order=recorded_at.desc&limit=288`;
      const dailyUrl = `${SUPABASE_URL}/rest/v1/daily_rainfall`
        + `?select=day,total_in&order=day.desc&limit=31`;

      const [recentRes, dailyRes] = await Promise.all([
        fetch(recentUrl, { headers: sbHeaders }),
        fetch(dailyUrl,  { headers: sbHeaders })
      ]);

      if (!recentRes.ok) throw new Error(`HTTP ${recentRes.status}`);
      recentRows = await recentRes.json();

      // Daily view is optional — if the SQL view isn't created yet,
      // the 24h tab still works and the other tabs show a hint.
      dailyRows = dailyRes.ok ? await dailyRes.json() : null;

      if (!recentRows.length) {
        setStatus('No data yet — waiting for CR800', false);
        return;
      }

      updateCards(recentRows[0]);
      renderChart();
      updateTable(recentRows.slice(0, 20));
      setStatus(`Updated ${formatTime(recentRows[0].recorded_at)}`, true);

    } catch (err) {
      console.error(err);
      setStatus('Error: ' + err.message, false, true);
    }
  }

  function updateCards(row) {
    document.getElementById('card-5min').textContent  = fmt(row.rain_5min, 4);
    document.getElementById('card-24h').textContent   = fmt(row.rain_24h,  3);
    document.getElementById('card-month').textContent = fmt(row.rain_month,2);
  }

  // ── Chart tabs ─────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderChart();
  }

  function renderChart() {
    let labels, data, title, decimals;

    if (currentTab === '24h') {
      const reversed = [...recentRows].reverse();
      labels   = reversed.map(r => formatTime(r.recorded_at));
      data     = reversed.map(r => parseFloat(r.rain_5min) || 0);
      title    = 'Rainfall — Last 24 Hours (5-min intervals)';
      decimals = 4;
    } else {
      const days = currentTab === 'weekly' ? 7 : 31;
      title = currentTab === 'weekly'
        ? 'Rainfall — Daily Totals (Last 7 Days)'
        : 'Rainfall — Daily Totals (Last 31 Days)';
      decimals = 2;

      if (!dailyRows) {
        labels = [];
        data   = [];
        title += ' — create the daily_rainfall view in Supabase';
      } else {
        const slice = dailyRows.slice(0, days).reverse();
        labels = slice.map(r => formatDay(r.day));
        data   = slice.map(r => parseFloat(r.total_in) || 0);
      }
    }

    document.getElementById('chart-title').textContent = title;
    drawChart(labels, data, decimals);
  }

  function drawChart(labels, data, decimals) {
    if (chart) { chart.destroy(); chart = null; }

    const ctx = document.getElementById('rainChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Rain (in)',
          data,
          backgroundColor: 'rgba(125,211,252,0.55)',
          borderColor:     '#7dd3fc',
          borderWidth: 1,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.parsed.y.toFixed(decimals)}"` 
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: '#64748b',
              maxTicksLimit: 12,
              maxRotation: 45
            },
            grid: { color: '#172230' }
          },
          y: {
            ticks: { color: '#64748b' },
            grid:  { color: '#172230' },
            title: {
              display: true,
              text: 'Inches',
              color: '#94a3b8'
            }
          }
        }
      }
    });
  }

  function updateTable(rows) {
    const tbody = document.getElementById('data-table-body');
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${formatTime(r.recorded_at)}</td>
        <td>${fmt(r.rain_5min, 4)}</td>
        <td>${fmt(r.rain_24h,  4)}</td>
        <td>${fmt(r.rain_month,4)}</td>
      </tr>`).join('');
  }

  function formatDay(dayStr) {
    if (!dayStr) return '—';
    const d = new Date(dayStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }

  function setStatus(msg, ok = null, err = false) {
    document.getElementById('status-text').textContent = msg;
    const dot = document.getElementById('status-dot');
    dot.className = '';
    if (ok === true)  dot.classList.add('ok');
    if (err)          dot.classList.add('err');
  }

  function formatTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-US', {
      month:'short', day:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  }

  function fmt(val, decimals) {
    const n = parseFloat(val);
    return isNaN(n) ? '—' : n.toFixed(decimals);
  }

  // Load on start, then refresh every 5 minutes
  loadData();
  setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
